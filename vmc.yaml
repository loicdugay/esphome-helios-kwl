        # Navigation vers commandes — fleche droite centree a droite
        - button:
            id: btn_goto_commands
            align: RIGHT_MID
            x: -4
            width: 40
            height: 64
            bg_color: 0x222244
            radius: 8
            on_press:
              then:
                - lvgl.page.show: commands_page
            widgets:
              - label:
                  text: "\U000F0142"
                  text_font: ash_icons_24
                  text_color: 0xCCCCFF
                  align: CENTER

    # ════════════════════════════════════════════════════
    # PAGE COMMANDES — P6 : layout grid sans superposition
    # ════════════════════════════════════════════════════

    - id: commands_page
      bg_color: 0x000000
      on_load:
        then:
          - lvgl.label.update:
              id: label_summer_state
              text: !lambda 'return id(sw_summer).state ? std::string("ON") : std::string("OFF");'
          - lvgl.label.update:
              id: label_service_months
              text: !lambda 'char buf[12]; sprintf(buf, "%.0f mois", id(sensor_service_months).state); return std::string(buf);'
          - lvgl.label.update:
              id: label_health_state
              text: !lambda |-
                int v = (int)id(sensor_health).state;
                if (v == 2) return "Defaut";
                if (v == 1) return "Filtre !";
                return "OK";

      widgets:

        - label:
            align: TOP_MID
            y: 8
            text: "Commandes VMC"
            text_font: roboto_font_24
            text_color: 0xFFFFFF

        # Retour — fleche gauche centree a gauche
        - button:
            align: LEFT_MID
            x: 4
            width: 40
            height: 64
            bg_color: 0x222244
            radius: 8
            on_press:
              then:
                - lvgl.page.show: main_page
            widgets:
              - label:
                  text: "\U000F0141"
                  text_font: ash_icons_24
                  text_color: 0xCCCCFF
                  align: CENTER

        # Grille de commandes : 2 colonnes x 3 lignes
        # Positionnement absolu avec espaces calcules pour 480x480
        # Colonne gauche : x=56, Colonne droite : x=260
        # Ligne 1 : y=48, Ligne 2 : y=180, Ligne 3 : y=312

        # ── L1C1 : Mode Fraicheur ──
        - obj:
            x: 56
            y: 48
            width: 190
            height: 120
            styles: obj_styles
            widgets:
              - label:
                  x: 0
                  y: 0
                  text: "Mode Fraicheur"
                  text_font: roboto_font_20
                  text_color: 0x8888AA
              - switch:
                  id: sw_lvgl_summer
                  x: 0
                  y: 30
              - label:
                  id: label_summer_state
                  x: 0
                  y: 80
                  text: "OFF"
                  text_font: roboto_font_20
                  text_color: 0x8888AA

        # ── L1C2 : Plein Air ──
        - button:
            id: btn_lvgl_boost_air
            x: 260
            y: 48
            width: 180
            height: 120
            bg_color: 0x0A2040
            radius: 10
            on_press:
              then:
                - button.press: btn_boost_air
            widgets:
              - label:
                  text: "\U000F0717"
                  text_font: ash_icons_24
                  text_color: 0x88CCFF
                  align: TOP_MID
                  y: 8
              - label:
                  text: "Plein Air"
                  text_font: roboto_font_20
                  text_color: 0xFFFFFF
                  align: CENTER
              - label:
                  id: label_boost_air_timer
                  text: "45 min"
                  text_font: roboto_font_20
                  text_color: 0x8888AA
                  align: BOTTOM_MID
                  y: -8

        # ── L2C1 : Cheminee ──
        - button:
            id: btn_lvgl_boost_fire
            x: 56
            y: 180
            width: 190
            height: 120
            bg_color: 0x301000
            radius: 10
            on_press:
              then:
                - button.press: btn_boost_fire
            widgets:
              - label:
                  text: "\U000F1629"
                  text_font: ash_icons_24
                  text_color: 0xFFAA44
                  align: TOP_MID
                  y: 8
              - label:
                  text: "Cheminee"
                  text_font: roboto_font_20
                  text_color: 0xFFFFFF
                  align: CENTER
              - label:
                  id: label_boost_fire_timer
                  text: "15 min"
                  text_font: roboto_font_20
                  text_color: 0x8888AA
                  align: BOTTOM_MID
                  y: -8

        # ── L2C2 : Arreter cycle (NOUVEAU) ──
        - button:
            id: btn_lvgl_stop_boost
            x: 260
            y: 180
            width: 180
            height: 120
            bg_color: 0x400000
            radius: 10
            on_press:
              then:
                - button.press: btn_stop_boost
            widgets:
              - label:
                  text: "\U000F04DB"
                  text_font: ash_icons_24
                  text_color: 0xFF4444
                  align: TOP_MID
                  y: 8
              - label:
                  text: "Arreter"
                  text_font: roboto_font_20
                  text_color: 0xFFFFFF
                  align: CENTER
              - label:
                  text: "Cycle"
                  text_font: roboto_font_20
                  text_color: 0x8888AA
                  align: BOTTOM_MID
                  y: -8

        # ── L3C1 : Filtres + sante ──
        - obj:
            x: 56
            y: 312
            width: 190
            height: 120
            styles: obj_styles
            widgets:
              - label:
                  x: 0
                  y: 0
                  text: "Filtres"
                  text_font: roboto_font_20
                  text_color: 0x8888AA
              - label:
                  id: label_service_months
                  x: 0
                  y: 30
                  text: "-- mois"
                  text_font: roboto_font_24
                  text_color: 0xFFFFFF
              - label:
                  id: label_health_state
                  x: 0
                  y: 70
                  text: "OK"
                  text_font: roboto_font_20
                  text_color: 0x44FF88

        # ── L3C2 : Reset filtres ──
        - button:
            id: btn_lvgl_ack_maint
            x: 260
            y: 312
            width: 180
            height: 120
            bg_color: 0x202000
            radius: 10
            on_press:
              then:
                - button.press: btn_ack_maint
            widgets:
              - label:
                  text: "\U000F012C"
                  text_font: ash_icons_24
                  text_color: 0xFFCC44
                  align: TOP_MID
                  y: 8
              - label:
                  text: "Reset"
                  text_font: roboto_font_20
                  text_color: 0xFFFFFF
                  align: CENTER
              - label:
                  text: "Filtres"
                  text_font: roboto_font_20
                  text_color: 0x8888AA
                  align: BOTTOM_MID
                  y: -8
