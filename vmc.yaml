# ═══════════════════════════════════════════════════════════════════
# 9. INTERFACE LVGL — header / arc / grille mesures / footer
# ═══════════════════════════════════════════════════════════════════

# LVGL — page unique, 0 scroll, geometrie fixe
#   Header  y   0..46   heure + date + icones etat
#   Corps   y  46..316  arc de vitesse + pastille de mode
#   Grille  y 316..410  4 mesures + micro-barres + ligne secondaire
#   Footer  y 410..480  Grand Air | Cheminee | Filtres | Power

lvgl:
  # Buffer plein ecran : rendu en une passe (PSRAM 8 Mo disponible)
  buffer_size: 100%
  touchscreens:
    - touchscreen_id: my_touchscreen
  # Veille anti-marquage LCD : apres 5 min sans toucher, frame noire +
  # retroeclairage coupe + rendu LVGL en pause. Une image statique
  # affichee en continu (meme attenuee) finit par marquer la dalle.
  on_idle:
    - timeout: 5min
      then:
        - lvgl.widget.update: {id: sleep_shield, hidden: false}
        - delay: 300ms   # laisse le temps de dessiner la frame noire
        - light.turn_off: lcd_backlight
        - lvgl.pause:

  style_definitions:
    - id: st_plain          # conteneur invisible, fige
      bg_opa: TRANSP
      border_width: 0
      radius: 0
      pad_all: 0
      shadow_width: 0
    - id: st_btn            # bouton du footer
      bg_color: "${ui_card}"
      bg_opa: 100%
      border_width: 1
      border_color: "${ui_line}"
      border_opa: 20%
      radius: 14
      shadow_width: 0
      pad_all: 0

  pages:
    - id: main_page
      bg_color: "${ui_bg}"
      pad_all: 0
      scrollbar_mode: "OFF"
      scrollable: false
      on_load:
        then:
          # Synchronisation initiale de l'UI avec l'etat courant
          - lambda: id(arc_updating) = true;
          - lvgl.arc.update:
              id: speed_arc
              value: !lambda "return id(helios_kwl_fan).state ? (int) id(helios_kwl_fan).speed : 0;"
          - lvgl.label.update:
              id: speed_lbl
              text: !lambda |-
                char b[4];
                snprintf(b, sizeof(b), "%d", id(helios_kwl_fan).state ? (int) id(helios_kwl_fan).speed : 0);
                return std::string(b);
          - lambda: id(arc_updating) = false;
          - script.execute: ui_apply_mode
          - script.execute: ui_apply_regul
          - script.execute: ui_refresh_boost
          - script.execute: ui_apply_power

      widgets:

        # ────────────────────────────────────────────────────
        # 1. HEADER (46 px)
        # ────────────────────────────────────────────────────

        # Capsule heure
        - obj:
            id: hdr_pill
            x: 14
            y: 8
            width: 96
            height: 30
            bg_color: "${ui_line}"
            bg_opa: 40%
            border_width: 0
            radius: 15
            pad_all: 0
            shadow_width: 0
            scrollbar_mode: "OFF"
            scrollable: false
            widgets:
              - label:
                  x: 12
                  align: LEFT_MID
                  text: "\U000F0150"
                  text_font: mdi_clock_12
                  text_color: "${ui_muted}"
                  text_opa: 60%
              - label:
                  id: time_lbl
                  x: 8
                  align: CENTER
                  text: "--:--"
                  text_font: mont_14
                  text_color: "${ui_text}"

        # Date complete
        - label:
            id: date_lbl
            x: 122
            y: 16
            text: "--"
            text_font: mont_12
            text_color: "${ui_muted}"

        # Icones d'etat (symboles natifs LVGL), positionnement absolu :
        # chaque icone est ancree RIGHT_MID -> centrage vertical exact
        # dans le header, espacement fixe de 31 px
        - obj:
            align: TOP_RIGHT
            x: -14
            y: 0
            width: 170
            height: 46
            styles: st_plain
            scrollbar_mode: "OFF"
            scrollable: false
            widgets:
              - label: {id: icon_bypass, align: RIGHT_MID, x: -124, text: "\uF074", text_font: montserrat_16, text_color: "${ui_muted}", text_opa: 20%}   # bypass (LV_SYMBOL_SHUFFLE)
              - label: {id: icon_heat,   align: RIGHT_MID, x: -93,  text: "\uF0E7", text_font: montserrat_16, text_color: "${ui_muted}", text_opa: 20%}   # degivrage (LV_SYMBOL_CHARGE)
              - label: {id: icon_warn,   align: RIGHT_MID, x: -62,  text: "\uF071", text_font: montserrat_16, text_color: "${ui_muted}", text_opa: 20%}   # defaut (LV_SYMBOL_WARNING)
              - label: {id: icon_maint,  align: RIGHT_MID, x: -31,  text: "\uF013", text_font: montserrat_16, text_color: "${ui_muted}", text_opa: 20%}   # filtres (LV_SYMBOL_SETTINGS)
              - label: {id: icon_wifi,   align: RIGHT_MID, x: 0,    text: "\uF1EB", text_font: montserrat_16, text_color: "${ui_muted}", text_opa: 20%}   # wifi (LV_SYMBOL_WIFI)

        # Separateur 1px sous le header
        - line:
            x: 14
            y: 46
            points: [[0, 0], [452, 0]]
            line_color: "${ui_line}"
            line_width: 1

        # ────────────────────────────────────────────────────
        # 2. CORPS — arc de vitesse (0-8) + pastille de mode
        # ────────────────────────────────────────────────────

        - arc:
            id: speed_arc
            align: TOP_MID
            y: 56
            width: 252
            height: 252
            # Zone tactile limitee a l'anneau lui-meme : sans ce flag, TOUT
            # l'interieur du cercle est cliquable et un appui rate sur une
            # pastille fait sauter le knob (= vitesse 0 -> extinction)
            adv_hittest: true
            adjustable: true
            value: 0
            min_value: 0
            max_value: 8
            start_angle: 135
            end_angle: 45
            arc_width: 14
            arc_color: "${ui_card}"
            arc_opa: 100%
            arc_rounded: true
            bg_opa: TRANSP
            border_width: 0
            indicator:
              arc_color: "${ui_orange}"   # defaut = mode Normal (hiver)
              arc_width: 14
              arc_rounded: true
            knob:
              bg_color: "${ui_text}"
              radius: 9999
              border_width: 2
              border_color: "${ui_orange}"
              pad_all: 4
            on_value:
              then:
                - if:
                    condition:
                      lambda: return !id(arc_updating);
                    then:
                      - lambda: id(arc_updating) = true;
                      - if:
                          condition:
                            lambda: return x == 0;
                          then:
                            - fan.turn_off: helios_kwl_fan
                          else:
                            - fan.turn_on:
                                id: helios_kwl_fan
                                speed: !lambda "return x;"
                      - lvgl.label.update:
                          id: speed_lbl
                          text: !lambda 'char b[4]; snprintf(b, sizeof(b), "%d", (int) x); return std::string(b);'
                      - lambda: id(arc_updating) = false;

        # Vitesse courante (gros chiffre au centre de l'arc)
        - label:
            id: speed_lbl
            align: TOP_MID
            y: 136
            text: "0"
            text_font: montserrat_48
            text_color: "${ui_text}"

        - label:
            align: TOP_MID
            y: 192
            text: "VITESSE"
            text_font: mont_12
            text_color: "${ui_faint}"

        # Pastille de mode : clic = bascule Normal <-> Air frais
        - button:
            id: mode_pill
            align: TOP_MID
            y: 224
            width: 150
            height: 36
            bg_color: "${ui_orange}"
            bg_opa: 14%
            border_width: 0
            radius: 12
            shadow_width: 0
            on_click:
              then:
                - switch.toggle: sw_summer
            widgets:
              - label:
                  id: mode_lbl
                  align: CENTER
                  text: "Normal"
                  text_font: mont_14
                  text_color: "${ui_orange}"

        # Pastilles de regulation intelligente, dans l'ouverture basse de
        # l'arc (secteur 45-135° sans anneau) : HR a gauche, CO2 a droite
        - button:
            id: chip_hr
            align: TOP_MID
            x: -48
            y: 280
            width: 60
            height: 28
            bg_color: "${ui_card}"
            border_width: 1
            border_color: "${ui_line}"
            border_opa: 20%
            radius: 15
            shadow_width: 0
            on_click:
              then:
                - switch.toggle: sw_hum_reg
            widgets:
              - label:
                  id: chip_hr_lbl
                  align: CENTER
                  text: "HR%"
                  text_font: mont_12
                  text_color: "${ui_faint}"

        - button:
            id: chip_co2
            align: TOP_MID
            x: 48
            y: 280
            width: 60
            height: 28
            bg_color: "${ui_card}"
            border_width: 1
            border_color: "${ui_line}"
            border_opa: 20%
            radius: 15
            shadow_width: 0
            on_click:
              then:
                - switch.toggle: sw_co2_reg
            widgets:
              - label:
                  id: chip_co2_lbl
                  align: CENTER
                  text: "CO2"
                  text_font: mont_12
                  text_color: "${ui_faint}"

        # ────────────────────────────────────────────────────
        # 3. GRILLE MESURES (4 colonnes de 105 px + ligne secondaire)
        # ────────────────────────────────────────────────────

        - line:
            x: 14
            y: 316
            points: [[0, 0], [452, 0]]
            line_color: "${ui_line}"
            line_width: 1

        # Libelles de colonnes
        - label: {x: 22,  y: 326, text: "INTÉRIEUR", text_font: mont_12, text_color: "${ui_faint}"}
        - label: {x: 133, y: 326, text: "SOUFFLÉ",   text_font: mont_12, text_color: "${ui_faint}"}
        - label: {x: 244, y: 326, text: "CUISINE",   text_font: mont_12, text_color: "${ui_faint}"}
        - label: {x: 355, y: 326, text: "SDB",       text_font: mont_12, text_color: "${ui_faint}"}

        # Valeurs
        - label: {id: val_int, x: 22,  y: 344, text: "--°", text_font: mont_18, text_color: "${ui_muted}"}
        - label: {id: val_sup, x: 133, y: 344, text: "--°", text_font: mont_18, text_color: "${ui_muted}"}
        - label: {id: val_cui, x: 244, y: 344, text: "--%", text_font: mont_18, text_color: "${ui_muted}"}
        - label: {id: val_sdb, x: 355, y: 344, text: "--%", text_font: mont_18, text_color: "${ui_muted}"}

        # Micro-barres (temperatures sur 0-40°C, humidites sur 0-100%)
        - bar: {id: bar_int, x: 22,  y: 372, width: 105, height: 4, min_value: 0, max_value: 40,  value: 0, bg_color: "${ui_line}", bg_opa: 100%, radius: 2, indicator: {bg_color: "${ui_green}", bg_opa: 80%, radius: 2}}
        - bar: {id: bar_sup, x: 133, y: 372, width: 105, height: 4, min_value: 0, max_value: 40,  value: 0, bg_color: "${ui_line}", bg_opa: 100%, radius: 2, indicator: {bg_color: "${ui_amber}", bg_opa: 80%, radius: 2}}
        - bar: {id: bar_cui, x: 244, y: 372, width: 105, height: 4, min_value: 0, max_value: 100, value: 0, bg_color: "${ui_line}", bg_opa: 100%, radius: 2, indicator: {bg_color: "${ui_cyan}", bg_opa: 80%, radius: 2}}
        - bar: {id: bar_sdb, x: 355, y: 372, width: 105, height: 4, min_value: 0, max_value: 100, value: 0, bg_color: "${ui_line}", bg_opa: 100%, radius: 2, indicator: {bg_color: "${ui_blue}", bg_opa: 80%, radius: 2}}

        # Ligne secondaire (air entrant / air rejete)
        - label: {id: lbl_out, x: 22,  y: 388, width: 220, text: "Extérieur  --°", text_align: CENTER, text_font: mont_12, text_color: "${ui_muted}"}
        - label: {id: lbl_exh, x: 238, y: 388, width: 220, text: "Rejeté  --°",     text_align: CENTER, text_font: mont_12, text_color: "${ui_muted}"}

        # ────────────────────────────────────────────────────
        # 4. FOOTER — 4 boutons (105x58, radius 14)
        # ────────────────────────────────────────────────────

        # Grand Air (45 min) / Annuler
        - button:
            id: btn_air
            x: 22
            y: 414
            width: 105
            height: 58
            styles: st_btn
            on_click:
              then:
                - if:
                    condition:
                      lambda: |-
                        float fs = id(sensor_boost_state).state;
                        return isnan(fs) || ((int) fs) == 0;
                    then:
                      # UI optimiste : etat demande affiche immediatement,
                      # "..." le temps que la CM confirme (1-2 s), puis
                      # ui_refresh_boost reconcilie avec l'etat reel.
                      - lvgl.widget.update: {id: btn_air, bg_color: "${ui_orange}"}
                      - lvgl.label.update: {id: title_air, text_color: "${ui_text}"}
                      - lvgl.label.update: {id: sub_air, text: "...", text_color: "${ui_text}"}
                      - lvgl.widget.update: {id: btn_fire, bg_color: "0x2A1215"}
                      - lvgl.label.update: {id: title_fire, text: "Annuler", text_color: "${ui_red}"}
                      - lvgl.label.update: {id: sub_fire, text: "le cycle", text_color: "${ui_red}"}
                      - button.press: btn_boost_air
                    else:
                      - lvgl.label.update: {id: sub_air, text: "..."}
                      - button.press: btn_stop_boost
            widgets:
              - label: {id: title_air, align: CENTER, y: -8, text: "Grand Air", text_font: mont_14, text_color: "${ui_text}"}
              - label: {id: sub_air, align: CENTER, y: 12, text: "45 min", text_font: mont_12, text_color: "${ui_muted}"}
              - bar: {id: bar_air, align: BOTTOM_MID, y: -5, width: 81, height: 3, min_value: 0, max_value: 45, value: 0, hidden: true, bg_color: 0x000000, bg_opa: 30%, radius: 2, indicator: {bg_color: "${ui_text}", bg_opa: 90%, radius: 2}}

        # Cheminee (15 min) / Annuler
        - button:
            id: btn_fire
            x: 133
            y: 414
            width: 105
            height: 58
            styles: st_btn
            on_click:
              then:
                - if:
                    condition:
                      lambda: |-
                        float fs = id(sensor_boost_state).state;
                        return isnan(fs) || ((int) fs) == 0;
                    then:
                      # UI optimiste (voir btn_air)
                      - lvgl.widget.update: {id: btn_fire, bg_color: "${ui_orange}"}
                      - lvgl.label.update: {id: title_fire, text_color: "${ui_text}"}
                      - lvgl.label.update: {id: sub_fire, text: "...", text_color: "${ui_text}"}
                      - lvgl.widget.update: {id: btn_air, bg_color: "0x2A1215"}
                      - lvgl.label.update: {id: title_air, text: "Annuler", text_color: "${ui_red}"}
                      - lvgl.label.update: {id: sub_air, text: "le cycle", text_color: "${ui_red}"}
                      - button.press: btn_boost_fire
                    else:
                      - lvgl.label.update: {id: sub_fire, text: "..."}
                      - button.press: btn_stop_boost
            widgets:
              - label: {id: title_fire, align: CENTER, y: -8, text: "Cheminée", text_font: mont_14, text_color: "${ui_text}"}
              - label: {id: sub_fire, align: CENTER, y: 12, text: "15 min", text_font: mont_12, text_color: "${ui_muted}"}
              - bar: {id: bar_fire, align: BOTTOM_MID, y: -5, width: 81, height: 3, min_value: 0, max_value: 15, value: 0, hidden: true, bg_color: 0x000000, bg_opa: 30%, radius: 2, indicator: {bg_color: "${ui_text}", bg_opa: 90%, radius: 2}}

        # Filtres : 1er appui = "Confirmer ?", 2e appui = reset, timeout 4 s
        - button:
            id: btn_filter
            x: 244
            y: 414
            width: 105
            height: 58
            styles: st_btn
            on_click:
              then:
                - if:
                    condition:
                      lambda: return !id(ack_pending);
                    then:
                      - globals.set: {id: ack_pending, value: 'true'}
                      - lvgl.label.update: {id: title_filter, text: "Confirmer ?", text_color: "${ui_red}"}
                      - lvgl.widget.update: {id: btn_filter, bg_color: 0x2A1215}
                      - script.execute: ack_timeout
                    else:
                      - script.stop: ack_timeout
                      - globals.set: {id: ack_pending, value: 'false'}
                      # "..." le temps que la CM confirme le nouveau compteur
                      - lvgl.label.update: {id: sub_filter, text: "..."}
                      - lvgl.label.update: {id: title_filter, text: "Filtres", text_color: "${ui_muted}"}
                      - lvgl.widget.update: {id: btn_filter, bg_color: "${ui_card}"}
                      - button.press: btn_ack_maint
            widgets:
              - label: {id: title_filter, align: CENTER, y: -8, text: "Filtres", text_font: mont_14, text_color: "${ui_muted}"}
              - label: {id: sub_filter, align: CENTER, y: 12, text: "-- mois", text_font: mont_12, text_color: "${ui_muted}"}

        # ────────────────────────────────────────────────────
        # Voile OFF : assombrit tout l'ecran quand la VMC est eteinte,
        # y compris les boutons de cycle/filtres declares plus haut.
        # Seul btn_power (declare apres) reste au-dessus du voile.
        # ────────────────────────────────────────────────────
        - obj:
            id: mask_off
            x: 0
            y: 0
            width: 480
            height: 480
            hidden: true
            bg_color: 0x000000
            bg_opa: 90%
            border_width: 0
            radius: 0
            pad_all: 0
            shadow_width: 0
            scrollbar_mode: "OFF"
            scrollable: false


        # Power : ON/OFF de la VMC (symbole natif LV_SYMBOL_POWER)
        - button:
            id: btn_power
            x: 355
            y: 414
            width: 105
            height: 58
            styles: st_btn
            on_click:
              then:
                - fan.toggle: helios_kwl_fan
            widgets:
              - label: {id: icon_power, align: CENTER, y: -9, text: "\uF011", text_font: montserrat_16, text_color: "${ui_muted}"}
              - label: {id: lbl_power, align: CENTER, y: 13, text: "OFF", text_font: mont_12, text_color: "${ui_muted}"}

        # \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
        # Frame noire de veille (anti-marquage). Dernier widget declare :
        # au-dessus de tout, y compris du footer. Montree juste avant
        # lvgl.pause, cachee au reveil par on_release du tactile.
        # \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
        - obj:
            id: sleep_shield
            x: 0
            y: 0
            width: 480
            height: 480
            hidden: true
            bg_color: 0x000000
            bg_opa: 100%
            border_width: 0
            radius: 0
            pad_all: 0
            shadow_width: 0
            scrollbar_mode: "OFF"
            scrollable: false
