# ─── Horloge ──────────────────────────────────────────────────

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Paris"      # Adapter à votre fuseau horaire
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.label.update:
              id: label_date_time
              text: !lambda |-
                const char* days[] = {"Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"};
                const char* months[] = {"janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"};
                auto now = id(sntp_time).now();
                char buffer[48];
                int dow_index = now.day_of_week - 1;
                sprintf(buffer, "%s %02d %s %04d %02d:%02d",
                        days[dow_index],
                        now.day_of_month,
                        months[now.month - 1],
                        now.year,
                        now.hour,
                        now.minute);
                return std::string(buffer);
