          - lvgl.widget.update:
              id: bar_sdb
              indicator:
                bg_color: !lambda 'uint32_t c = x < 30 ? 0xF97316 : x < 40 ? 0xFBBF24 : x <= 60 ? 0x10B981 : x <= 70 ? 0x06B6D4 : 0x60A5FA; return lv_color_hex(c);'

    humidity_sensor2:
