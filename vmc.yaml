    # ════════════════════════════════════════════════════════
    # PAGE COMMANDES — cycles, saison, maintenance
    # Layout corrigé : pas de superposition, navigation gauche
    # ════════════════════════════════════════════════════════

    - id: commands_page
      bg_color: 0x000000
      on_load:
        then:
          - lvgl.label.update:
              id: label_summer_state
              text: !lambda "return id(sw_summer).state ? std::string(\"Fraîcheur\") : std::string(\"Hiver\");"
          - lvgl.label.update:
              id: label_service_months
              text: !lambda |-
                char buf[12];
                sprintf(buf, "%.0f mois", id(sensor_service_months).state);
                return std::string(buf);
          - lvgl.label.update:
              id: label_health_state
              text: !lambda |-
                int v = (int)id(sensor_health).state;
                if (v == 2) return "Défaut";
                if (v == 1) return "Filtre !";
                return "Optimal";
          - lvgl.label.update:
              id: label_boost_air_timer
              text: !lambda |-
                if (id(ts_boost_active).state == "Cycle Plein Air") {
                  char buf[12];
                  sprintf(buf, "%.0f min", id(sensor_boost_remaining).state);
                  return std::string(buf);
                }
                return std::string("45 min");
          - lvgl.label.update:
              id: label_boost_fire_timer
              text: !lambda |-
                if (id(ts_boost_active).state == "Cycle Cheminée") {
                  char buf[12];
                  sprintf(buf, "%.0f min", id(sensor_boost_remaining).state);
                  return std::string(buf);
                }
                return std::string("15 min");
          - lvgl.label.update:
              id: label_boost_icon
              text_opa: !lambda "return (id(ts_boost_active).state != \"Normal\") ? 100 : 30;"

      widgets:

        - label:
            align: TOP_MID
            y: 12
            text: "Commandes VMC"
            text_font: roboto_font_24
            text_color: 0xFFFFFF

