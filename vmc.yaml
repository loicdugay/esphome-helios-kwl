# ═══════════════════════════════════════════════════════════════════
# VMC Helios KWL EC 300 Pro — Lilygo T-Panel S3 (ecran tactile 480x480)
#
# UI "Premium Domotique" : page unique, geometrie verrouillee (0 scroll),
# palette sombre mate, polices Montserrat (accents FR), symboles LVGL natifs.
#
# Le fichier se lit de haut en bas :
#   1. Substitutions   — noms des entites HA + palette de couleurs UI
#   2. Plateforme      — carte, framework, memoire, logs
#   3. Connectivite    — WiFi, API Home Assistant, OTA
#   4. Liaison VMC     — composant helios_kwl + bus RS485
#   5. Ecran           — tactile, dalle RGB, retroeclairage, polices
#   6. Horloge         — SNTP + mise a jour du header
#   7. Etat & scripts  — variables globales + automatisations UI
#   8. Entites HA      — capteurs/commandes exposes (avec data-binding UI)
#   9. Interface LVGL  — header / arc / grille / footer
# ═══════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════
# 1. SUBSTITUTIONS — noms HA et palette UI
# ═══════════════════════════════════════════════════════════════════

substitutions:
  device_name: "vmc"
  friendly_name: "VMC"
  room_humidity1: "Salle de bain"
  room_humidity2: "Cuisine"
  timezone: "Europe/Paris"

  # ── Noms HA conformes au referentiel helios-kwl-referentiel ──
  name_fan:             "Ventilation"
  name_temp_outside:    "Température air extérieur"
  name_temp_exhaust:    "Température air rejeté"
  name_temp_extract:    "Température air intérieur"
  name_temp_supply:     "Température air soufflé"
  name_humidity1:       "Humidité ${room_humidity1}"
  name_humidity2:       "Humidité ${room_humidity2}"
  name_fan_speed:       "Vitesse de ventilation"
  name_boost_remaining: "Fin du cycle dans..."
  name_boost_active:    "Cycle en cours"
  name_boost_state_num: "Cycle en cours (num)"
  name_bypass_state:    "Gestion thermique"
  name_bypass_num:      "Gestion thermique (num)"
  name_summer:          "Mode Fraîcheur"
  name_health:          "Santé du Système"
  name_fault_code:      "Code de diagnostic"
  name_fault_desc:      "Détail du diagnostic"
  name_preheating:      "Auto-dégivrage"
  name_freeze_alarm:    "Alerte Givre"
  name_filter_maint:    "État des filtres"
  name_service_months:  "Prochain remplacement"
  name_heating:         "Appoint de chaleur"
  name_supply_fan:      "Ventilateur soufflage"
  name_exhaust_fan:     "Ventilateur extraction"
  name_ext_contact:     "Contact externe"
  name_fault_relay:     "Relais défaut"
  name_hum_reg:         "Gestion intelligente (%HR)"
  name_basic_speed:     "Ventilation nominale"
  name_max_speed:       "Ventilation maximale"
  name_bypass_temp:     "Seuil de fraîcheur"
  name_preheat_temp:    "Seuil de dégivrage"
  name_frost_temp:      "Seuil Alerte Givre"
  name_frost_hyst:      "Hystérésis antigel"
  name_hum_set:         "Seuil Humidité"
  name_reg_interval:    "Fréquence d'analyse des sondes"
  name_supply_pct:      "Ajustement Soufflage"
  name_exhaust_pct:     "Ajustement Extraction"
  name_svc_interval:    "Intervalle entretien"
  name_boost_mode:      "Cycle commande murale"
  name_hum_auto:        "Détection humidité"
  name_max_cont:        "Ventilation maximale forcée"
  name_btn_air:         "Cycle Plein Air"
  name_btn_fire:        "Cycle Cheminée"
  name_btn_stop:        "Arrêter le cycle"
  name_btn_ack:         "Confirmer remplacement filtres"
  name_wifi_signal:     "Signal WiFi"
  name_backlight:       "Rétroéclairage écran"

  # ── Palette UI (fond mat sombre + accents doux) ──
  ui_bg:     "0x070E1B"   # fond
  ui_card:   "0x0F1929"   # surfaces (pistes, boutons inactifs)
  ui_line:   "0x162038"   # bordures/separateurs 1px
  ui_text:   "0xF1F5F9"   # texte principal
  ui_muted:  "0x8E9FB8"   # texte secondaire
  ui_faint:  "0x70819A"   # libelles de colonnes
  ui_cyan:   "0x06B6D4"   # mode Air frais (ete, bypass = fraicheur)
  ui_orange: "0xF97316"   # mode Normal (hiver, chaleur conservee) + cycle actif
  ui_green:  "0x10B981"   # interieur / ON
  ui_amber:  "0xFBBF24"   # souffle / filtre
  ui_blue:   "0x60A5FA"   # SdB
  ui_red:    "0xEF4444"   # defaut / confirmation

# ═══════════════════════════════════════════════════════════════════
# 2. PLATEFORME — ESP32-S3, framework, memoire
# ═══════════════════════════════════════════════════════════════════

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 5%

esp32:
  board: esp32-s3-devkitc-1
  # 240 MHz (au lieu de 160) : rendu LVGL et flush ecran ~50% plus rapides,
  # pour quelques dizaines de mW supplementaires
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    advanced:
      # Compilation optimisee vitesse (-O2) plutot que taille : la flash a
      # de la marge (~65%), autant la depenser en performance d'affichage
      compiler_optimization: PERF
    # Optimisations memoire : les options Kconfig ESP-IDF doivent passer par
    # sdkconfig_options (les -D dans platformio_options sont ignores).
    sdkconfig_options:
      CONFIG_FREERTOS_PLACE_FUNCTIONS_INTO_FLASH: "y"
      CONFIG_RINGBUF_PLACE_FUNCTIONS_INTO_FLASH: "y"
      CONFIG_ESP_WIFI_IRAM_OPT: "n"
      CONFIG_ESP_WIFI_RX_IRAM_OPT: "n"
      CONFIG_LWIP_IRAM_OPTIMIZATION: "n"

psram:
  mode: quad
  speed: 80MHz

logger:
  level: INFO

# ═══════════════════════════════════════════════════════════════════
# 3. CONNECTIVITE — WiFi, API, mises a jour OTA
# ═══════════════════════════════════════════════════════════════════

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "VMC Wi-Fi Direct"
    password: !secret ap_password
  on_connect:
    - lvgl.label.update:
        id: icon_wifi
        text_opa: 100%
  on_disconnect:
    - lvgl.label.update:
        id: icon_wifi
        text_opa: 20%

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# ═══════════════════════════════════════════════════════════════════
# 4. LIAISON VMC — composant helios_kwl sur bus RS485
# ═══════════════════════════════════════════════════════════════════

external_components:
  - source:
      type: git
      url: https://github.com/loicdugay/esphome-helios-kwl/
    components: [helios_kwl]
    # 0s force le re-clone a chaque compilation : indispensable tant que le
    # composant evolue. Passer a 1d une fois le composant stabilise.
    refresh: 0s

uart:
  id: uart_bus
  tx_pin: 16
  rx_pin: 15
  baud_rate: 9600

helios_kwl:
  id: helios_kwl_0
  uart_id: uart_bus
  update_interval: 1s

# ═══════════════════════════════════════════════════════════════════
# 5. ECRAN & PERIPHERIQUES — tactile, dalle, retroeclairage, polices
# ═══════════════════════════════════════════════════════════════════

i2c:
  - id: tp_i2c
    sda: 17
    scl: 18
    scan: true
    frequency: 400kHz

xl9535:
  id: expander

spi:
  - id: lcd_spi
    interface: software
    mosi_pin:
      xl9535:
      number: 16
    clk_pin:
      xl9535:
      number: 15

display:
  - platform: mipi_rgb
    model: t-panel-s3

# Polling pur a 32 ms (PAS d'interrupt_pin) : avec une interruption declaree,
# ESPHome coupe le polling et le suivi de glissement devient saccade.

touchscreen:
  - platform: cst226
    i2c_id: tp_i2c
    id: my_touchscreen
    address: 0x5A
    update_interval: 32ms
    reset_pin:
      xl9535:
      number: 4
    calibration:
      x_min: 0
      x_max: 480
      y_min: 0
      y_max: 480
    on_touch:
      - script.execute: backlight_timeout
    on_release:
      # Reveil depuis la veille anti-marquage : le toucher de reveil est
      # absorbe (LVGL etait en pause, aucun widget ne le recoit).
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.update: {id: sleep_shield, hidden: true}
            - lvgl.widget.redraw:

output:
  - platform: ledc
    id: backlight_output
    pin: 14
    frequency: 1220Hz
    inverted: false
    min_power: 15%
    # Sans cette option, "eteint" sort min_power (15%) et le retroeclairage
    # reste allume pendant la veille anti-marquage
    zero_means_zero: true

light:
  - platform: monochromatic
    output: backlight_output
    name: ${name_backlight}
    id: lcd_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 500ms
    gamma_correct: 1.0

# - Montserrat via Google Fonts (Apache 2.0), glyphes limites au strict
#   necessaire + accents francais complets (é è ê ë à â î ï ô û ù ç °)
# - Les icones utilisent les symboles NATIFS LVGL des polices montserrat_XX
#   integrees (WIFI, WARNING, SETTINGS, POWER, SHUFFLE, CHARGE)
# - Seule exception : l'horloge du header (absente des symboles LVGL),
#   1 glyphe MDI de 12px

font:
  - file: "https://raw.githubusercontent.com/Templarian/MaterialDesign-Webfont/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_clock_12
    size: 12
    bpp: 4
    glyphs: ["\U000F0150"]   # horloge

  - file: "gfonts://Montserrat@500"
    id: mont_12
    size: 12
    bpp: 4
    glyphs: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 %°?!'./:,-éèêëàâîïôûùçÉÈÊÀÎÔÛÇ"

  - file: "gfonts://Montserrat@500"
    id: mont_14
    size: 14
    bpp: 4
    glyphs: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 %°?!'./:,-éèêëàâîïôûùçÉÈÊÀÎÔÛÇ"

  - file: "gfonts://Montserrat@600"
    id: mont_18
    size: 18
    bpp: 4
    glyphs: "0123456789 %°.,-INTSOUFLECBRDdbmoisax"

# ═══════════════════════════════════════════════════════════════════
# 6. HORLOGE — SNTP + header heure/date
# ═══════════════════════════════════════════════════════════════════

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.label.update:
              id: time_lbl
              text: !lambda |-
                auto n = id(sntp_time).now();
                char b[8];
                snprintf(b, sizeof(b), "%02d:%02d", n.hour, n.minute);
                return std::string(b);
          - lvgl.label.update:
              id: date_lbl
              text: !lambda |-
                static const char *D[] = {"Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"};
                static const char *M[] = {"janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"};
                auto n = id(sntp_time).now();
                char b[40];
                snprintf(b, sizeof(b), "%s %d %s %04d", D[n.day_of_week - 1], n.day_of_month, M[n.month - 1], n.year);
                return std::string(b);

# ═══════════════════════════════════════════════════════════════════
# 7. ETAT & SCRIPTS UI — variables et automatisations
# ═══════════════════════════════════════════════════════════════════

globals:
  - id: arc_updating           # anti-boucle arc <-> fan
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: ack_pending            # confirmation "Reset filtres" en attente
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: ack_countdown          # secondes restantes de la confirmation
    type: int
    restore_value: false
    initial_value: '0'

script:
  - id: backlight_timeout
    mode: restart
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 100%
      - delay: 30s
      - light.turn_on:
          id: lcd_backlight
          brightness: 5%

  # Confirmation filtres : 30 s pour confirmer, decompte affiche dans le
  # bouton ; sans second appui, retour a l'etat normal
  - id: ack_timeout
    mode: restart
    then:
      - globals.set: {id: ack_countdown, value: '30'}
      - while:
          condition:
            lambda: 'return id(ack_pending) && id(ack_countdown) > 0;'
          then:
            - lvgl.label.update:
                id: sub_filter
                text_color: "${ui_red}"
                text: !lambda 'char b[8]; snprintf(b, sizeof(b), "%d s", id(ack_countdown)); return std::string(b);'
            - delay: 1s
            - lambda: 'id(ack_countdown) -= 1;'
      - globals.set: {id: ack_pending, value: 'false'}
      - lvgl.label.update: {id: title_filter, text: "Filtres", text_color: "${ui_muted}"}
      - lvgl.widget.update: {id: btn_filter, bg_color: "${ui_card}"}
      - lvgl.label.update:
          id: sub_filter
          text_color: "${ui_muted}"
          text: !lambda |-
            float m = id(sensor_service_months).state;
            if (isnan(m)) return std::string("-- mois");
            char b[12];
            snprintf(b, sizeof(b), "%.0f mois", m);
            return std::string(b);

  # Couleurs du mode (arc + knob + pastille + icone bypass) :
  # orange cuivre = Normal (hiver, on conserve la chaleur),
  # cyan = Air frais (ete, le froid se lit en bleu).
  - id: ui_apply_mode
    then:
      - if:
          condition:
            switch.is_on: sw_summer
          then:
            - lvgl.widget.update:
                id: speed_arc
                indicator: {arc_color: "${ui_cyan}"}
                knob: {border_color: "${ui_cyan}"}
            - lvgl.widget.update: {id: mode_pill, bg_color: "${ui_cyan}"}
            - lvgl.label.update: {id: mode_lbl, text: "Air frais", text_color: "${ui_cyan}"}
            - lvgl.label.update: {id: icon_bypass, text_color: "${ui_cyan}", text_opa: 100%}
          else:
            - lvgl.widget.update:
                id: speed_arc
                indicator: {arc_color: "${ui_orange}"}
                knob: {border_color: "${ui_orange}"}
            - lvgl.widget.update: {id: mode_pill, bg_color: "${ui_orange}"}
            - lvgl.label.update: {id: mode_lbl, text: "Normal", text_color: "${ui_orange}"}
            - lvgl.label.update: {id: icon_bypass, text_color: "${ui_muted}", text_opa: 20%}
      - script.execute: ui_apply_regul

  # Etat des boutons de cycle : 0 = repos, 1 = Grand Air actif, 2 = Cheminee
  # actif. Le bouton actif = orange + compte a rebours + micro-barre ; le
  # non-actif devient "Annuler" (grise, stoppe le cycle en cours).
  - id: ui_refresh_boost
    then:
      - if:
          condition: {lambda: 'return ((int) id(sensor_boost_state).state) == 1;'}
          then:
            # Grand Air actif
            - lvgl.widget.update: {id: btn_air, bg_color: "${ui_orange}"}
            - lvgl.label.update: {id: title_air, text: "Grand Air", text_color: "${ui_text}"}
            - lvgl.label.update:
                id: sub_air
                text_color: "${ui_text}"
                text: !lambda |-
                  float r = id(sensor_boost_remaining).state;
                  char b[12];
                  snprintf(b, sizeof(b), "%d min", isnan(r) ? 0 : (int) r);
                  return std::string(b);
            - lvgl.bar.update:
                id: bar_air
                value: !lambda 'float r = id(sensor_boost_remaining).state; return isnan(r) ? 0 : (int) r;'
            - lvgl.widget.update: {id: bar_air, hidden: false}
            - lvgl.widget.update: {id: bar_fire, hidden: true}
            - lvgl.widget.update: {id: btn_fire, bg_color: "0x2A1215"}
            - lvgl.label.update: {id: title_fire, text: "Annuler", text_color: "${ui_red}"}
            - lvgl.label.update: {id: sub_fire, text: "le cycle", text_color: "${ui_red}"}
      - if:
          condition: {lambda: 'return ((int) id(sensor_boost_state).state) == 2;'}
          then:
            # Cheminee active
            - lvgl.widget.update: {id: btn_fire, bg_color: "${ui_orange}"}
            - lvgl.label.update: {id: title_fire, text: "Cheminée", text_color: "${ui_text}"}
            - lvgl.label.update:
                id: sub_fire
                text_color: "${ui_text}"
                text: !lambda |-
                  float r = id(sensor_boost_remaining).state;
                  char b[12];
                  snprintf(b, sizeof(b), "%d min", isnan(r) ? 0 : (int) r);
                  return std::string(b);
            - lvgl.bar.update:
                id: bar_fire
                value: !lambda 'float r = id(sensor_boost_remaining).state; return isnan(r) ? 0 : (int) r;'
            - lvgl.widget.update: {id: bar_fire, hidden: false}
            - lvgl.widget.update: {id: bar_air, hidden: true}
            - lvgl.widget.update: {id: btn_air, bg_color: "0x2A1215"}
            - lvgl.label.update: {id: title_air, text: "Annuler", text_color: "${ui_red}"}
            - lvgl.label.update: {id: sub_air, text: "le cycle", text_color: "${ui_red}"}
      - if:
          condition:
            lambda: |-
              float fs = id(sensor_boost_state).state;
              return isnan(fs) || ((int) fs) == 0;
          then:
            # Repos : les deux boutons proposent leur cycle
            - lvgl.widget.update: {id: btn_air, bg_color: "${ui_card}"}
            - lvgl.label.update: {id: title_air, text: "Grand Air", text_color: "${ui_text}"}
            - lvgl.label.update: {id: sub_air, text: "45 min", text_color: "${ui_muted}"}
            - lvgl.widget.update: {id: bar_air, hidden: true}
            - lvgl.widget.update: {id: btn_fire, bg_color: "${ui_card}"}
            - lvgl.label.update: {id: title_fire, text: "Cheminée", text_color: "${ui_text}"}
            - lvgl.label.update: {id: sub_fire, text: "15 min", text_color: "${ui_muted}"}
            - lvgl.widget.update: {id: bar_fire, hidden: true}

  # Pastilles de regulation intelligente (sous l'arc) : HR = pilotage par
  # l'humidite, CO2 = pilotage par le CO2. Active = teinte pleine,
  # inactive = estompee.
  # Pastilles HR%/CO2 : actives = couleur du mode en cours (orange en
  # Normal/hiver, cyan en Air frais/ete) avec texte sombre ; inactives =
  # carte sombre + texte estompe. Rappele par ui_apply_mode a chaque
  # changement de mode pour rester synchrone.
  - id: ui_apply_regul
    then:
      - if:
          condition:
            switch.is_on: sw_hum_reg
          then:
            - if:
                condition: {switch.is_on: sw_summer}
                then:
                  - lvgl.widget.update: {id: chip_hr, bg_color: "${ui_cyan}", bg_opa: 100%}
                else:
                  - lvgl.widget.update: {id: chip_hr, bg_color: "${ui_orange}", bg_opa: 100%}
            - lvgl.label.update: {id: chip_hr_lbl, text_color: "${ui_bg}"}
          else:
            - lvgl.widget.update: {id: chip_hr, bg_color: "${ui_card}", bg_opa: 100%}
            - lvgl.label.update: {id: chip_hr_lbl, text_color: "${ui_faint}"}
      - if:
          condition:
            switch.is_on: sw_co2_reg
          then:
            - if:
                condition: {switch.is_on: sw_summer}
                then:
                  - lvgl.widget.update: {id: chip_co2, bg_color: "${ui_cyan}", bg_opa: 100%}
                else:
                  - lvgl.widget.update: {id: chip_co2, bg_color: "${ui_orange}", bg_opa: 100%}
            - lvgl.label.update: {id: chip_co2_lbl, text_color: "${ui_bg}"}
          else:
            - lvgl.widget.update: {id: chip_co2, bg_color: "${ui_card}", bg_opa: 100%}
            - lvgl.label.update: {id: chip_co2_lbl, text_color: "${ui_faint}"}

  # VMC eteinte : le voile 90% couvre tout l'ecran, y compris les boutons
  # de cycle/filtres (declares SOUS le voile : meme assombrissement que le
  # reste, touches interceptees). Seul le bouton power, au-dessus du voile,
  # reste actif — vert doux 50%, texte "ON".
  - id: ui_apply_power
    then:
      - if:
          condition:
            lambda: 'return id(helios_kwl_fan).state;'
          then:
            - lvgl.widget.update: {id: mask_off, hidden: true}
            - lvgl.widget.update: {id: btn_power, bg_color: "${ui_card}", bg_opa: 100%}
            - lvgl.label.update: {id: icon_power, text_color: "${ui_muted}"}
            - lvgl.label.update: {id: lbl_power, text: "OFF", text_color: "${ui_muted}"}
          else:
            - lvgl.widget.update: {id: mask_off, hidden: false}
            - lvgl.widget.update: {id: btn_power, bg_color: "${ui_green}", bg_opa: 50%}
            - lvgl.label.update: {id: icon_power, text_color: "${ui_text}"}
            - lvgl.label.update: {id: lbl_power, text: "ON", text_color: "${ui_text}"}

# ═══════════════════════════════════════════════════════════════════
# 8. ENTITES HOME ASSISTANT — avec data-binding vers l'UI
# ═══════════════════════════════════════════════════════════════════

fan:
  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0
    ventilation_fan:
      id: helios_kwl_fan
      name: ${name_fan}
      restore_mode: RESTORE_DEFAULT_OFF
      on_speed_set:
        then:
          - lambda: id(arc_updating) = true;
          - lvgl.arc.update: {id: speed_arc, value: !lambda "return x;"}
          - lvgl.label.update:
              id: speed_lbl
              text: !lambda 'char b[4]; snprintf(b, sizeof(b), "%d", (int) x); return std::string(b);'
          - lambda: id(arc_updating) = false;
      on_turn_off:
        then:
          - lambda: id(arc_updating) = true;
          - lvgl.arc.update: {id: speed_arc, value: 0}
          - lvgl.label.update: {id: speed_lbl, text: "0"}
          - lambda: id(arc_updating) = false;
          - script.execute: ui_apply_power
      on_turn_on:
        then:
          - lambda: id(arc_updating) = true;
          - lvgl.arc.update:
              id: speed_arc
              value: !lambda "return (int) id(helios_kwl_fan).speed;"
          - lvgl.label.update:
              id: speed_lbl
              text: !lambda 'char b[4]; snprintf(b, sizeof(b), "%d", (int) id(helios_kwl_fan).speed); return std::string(b);'
          - lambda: id(arc_updating) = false;
          - script.execute: ui_apply_power

sensor:
  - platform: wifi_signal
    name: ${name_wifi_signal}
    id: sensor_wifi
    update_interval: 30s
    on_value:
      # Wi-Fi "dynamique" : l'opacite de l'icone suit la puissance du signal
      then:
        - lvgl.label.update:
            id: icon_wifi
            # Opacite LVGL en 0-255 : 255 = plein signal, 180 = moyen, 100 = faible
            text_opa: !lambda |-
              if (x >= -60) return 255;
              if (x >= -72) return 180;
              return 100;

  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0

    fan_speed:
      name: ${name_fan_speed}
      id: sensor_fan_speed

    temperature_outside:
      name: ${name_temp_outside}
      id: sensor_temp_outside
      filters:
        - exponential_moving_average: {alpha: 0.3, send_every: 3, send_first_at: 1}
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_out
              text: !lambda 'char b[24]; snprintf(b, sizeof(b), "Extérieur  %.0f°", x); return std::string(b);'

    temperature_exhaust:
      name: ${name_temp_exhaust}
      id: sensor_temp_exhaust
      filters:
        - exponential_moving_average: {alpha: 0.3, send_every: 3, send_first_at: 1}
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_exh
              text: !lambda 'char b[24]; snprintf(b, sizeof(b), "Rejeté  %.0f°", x); return std::string(b);'

    temperature_extract:
      name: ${name_temp_extract}
      id: sensor_temp_extract
      filters:
        - exponential_moving_average: {alpha: 0.3, send_every: 3, send_first_at: 1}
      on_value:
        then:
          # Couleur = confort thermique (echelle ADEME/ARS, voir commentaire
          # du script ui_apply_regul) ; plage de barre re-imposee a 0-40
          - lvgl.label.update:
              id: val_int
