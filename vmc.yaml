# ═══════════════════════════════════════════════════════════════
# VMC Helios KWL EC 300 Pro — Lilygo T-Panel S3
# Phase 2 — corrections protocole, LVGL, conversions NTC
# ═══════════════════════════════════════════════════════════════

substitutions:
  device_name: "vmc"
  friendly_name: "VMC"
  room_humidity1: "S. de bain"
  room_humidity2: "Cuisine"
  timezone: "Europe/Paris"
  # ── Noms HA avec accents (UTF-8 supporte par HA) ──
  name_fan:             "Ventilation VMC"
  name_temp_outside:    "Température extérieure"
  name_temp_exhaust:    "Température air rejeté"
  name_temp_extract:    "Température air repris"
  name_temp_supply:     "Température air neuf"
  name_humidity1:       "Humidité ${room_humidity1}"
  name_humidity2:       "Humidité ${room_humidity2}"
  name_co2:             "Niveau CO₂"
  name_fan_speed:       "Vitesse de ventilation"
  name_boost_remaining: "Fin du cycle dans..."
  name_boost_active:    "Cycle en cours"
  name_bypass_state:    "Gestion thermique"
  name_health:          "Santé du système"
  name_fault_code:      "Code de diagnostic"
  name_fault_desc:      "Détail du diagnostic"
  name_preheating:      "Auto-dégivrage"
  name_freeze_alarm:    "Alerte givre"
  name_co2_alarm:       "Alerte CO₂"
  name_filter_maint:    "État des filtres"
  name_service_months:  "Prochain remplacement filtres"
  name_heating:         "Appoint de chaleur"
  name_supply_fan:      "Ventilateur soufflage"
  name_exhaust_fan:     "Ventilateur extraction"
  name_ext_contact:     "Contact externe"
  name_fault_relay:     "Relais défaut"
  name_boost_state_num: "État cycle numérique"
  name_bypass_num:      "État bypass numérique"
  name_co2_reg:         "Gestion intelligente CO₂"
  name_hum_reg:         "Gestion intelligente %HR"
  name_summer:          "Mode Fraîcheur"
  name_basic_speed:     "Ventilation nominale"
  name_max_speed:       "Ventilation maximale"
  name_bypass_temp:     "Seuil de fraîcheur"
  name_preheat_temp:    "Seuil de dégivrage"
  name_frost_temp:      "Seuil alerte givre"
  name_frost_hyst:      "Hystérésis antigel"
  name_co2_set:         "Seuil CO₂"
  name_hum_set:         "Seuil humidité"
  name_reg_interval:    "Fréquence analyse sondes"
  name_supply_pct:      "Ajustement soufflage"
  name_exhaust_pct:     "Ajustement extraction"
  name_svc_interval:    "Intervalle entretien"
  name_boost_mode:      "Cycle commande murale"
  name_hum_auto:        "Détection humidité"
  name_max_cont:        "Ventilation maximale forcée"
  name_btn_air:         "Cycle Plein Air"
  name_btn_fire:        "Cycle Cheminée"
  name_btn_stop:        "Arrêter le cycle"
  name_btn_ack:         "Confirmer remplacement filtres"
  name_wifi_signal:     "Signal WiFi"
  name_backlight:       "Rétroéclairage écran"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.extra_flags:
      - "-DCONFIG_RINGBUF_PLACE_FUNCTIONS_INTO_FLASH=1"
      - "-DCONFIG_LWIP_IRAM_OPTIMIZATION=0"
      - "-DCONFIG_SPI_MASTER_IN_IRAM=0"
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 5%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

psram:
  mode: quad
  speed: 80MHz

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "VMC Wi-Fi Direct"
    password: !secret ap_password
  on_connect:
    - lvgl.label.update:
        id: label_wifi_strength
        text: "\U000F0922"
  on_disconnect:
    - lvgl.label.update:
        id: label_wifi_strength
        text: "\U000F092E"

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/loicdugay/esphome-helios-kwl/
    refresh: 0s

i2c:
  - id: tp_i2c
    sda: 17
    scl: 18
    scan: true
    frequency: 400kHz

xl9535:
  id: expander

touchscreen:
  - platform: cst3240
    i2c_id: tp_i2c
    id: my_touchscreen
    interrupt_pin: 21
    reset_pin:
      xl9535:
      number: 4
    update_interval: 32ms
    calibration:
      x_min: 0
      x_max: 480
      y_min: 0
      y_max: 480
    on_touch:
      - script.execute: backlight_timeout

uart:
  id: uart_bus
  tx_pin: 16
  rx_pin: 15
  baud_rate: 9600

helios_kwl:
  id: helios_kwl_0
  uart_id: uart_bus
  update_interval: 1s

globals:
  - id: arc_updating
    type: bool
    restore_value: false
    initial_value: 'false'

script:
  - id: backlight_timeout
    mode: restart
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 100%
      - delay: 30s
      - light.turn_on:
          id: lcd_backlight
          brightness: 5%

fan:
  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0
    ventilation_fan:
      id: helios_kwl_fan
      name: ${name_fan}
      restore_mode: RESTORE_DEFAULT_ON
      on_speed_set:
        then:
          - lambda: id(arc_updating) = true;
          - lvgl.arc.update:
              id: fan_speed_arc
              value: !lambda "return x;"
          - lvgl.label.update:
              id: label_fan_speed
              text: !lambda 'char buf[4]; sprintf(buf, "%d", (int)x); return std::string(buf);'
          - lambda: id(arc_updating) = false;
      on_turn_off:
        then:
          - lambda: id(arc_updating) = true;
          - lvgl.arc.update:
              id: fan_speed_arc
              value: 0
          - lvgl.label.update:
              id: label_fan_speed
              text: "0"
          - lambda: id(arc_updating) = false;
      on_turn_on:
        then:
          - lambda: id(arc_updating) = true;
          - lvgl.arc.update:
              id: fan_speed_arc
              value: !lambda "return (int)id(helios_kwl_fan).speed;"
          - lvgl.label.update:
              id: label_fan_speed
              text: !lambda 'char buf[4]; sprintf(buf, "%d", (int)id(helios_kwl_fan).speed); return std::string(buf);'
          - lambda: id(arc_updating) = false;

sensor:
  - platform: wifi_signal
    name: ${name_wifi_signal}
    update_interval: 30s

  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0
    fan_speed:
      name: ${name_fan_speed}
      id: sensor_fan_speed
    temperature_outside:
      name: ${name_temp_outside}
      id: sensor_temp_outside
      filters:
        - exponential_moving_average:
            alpha: 0.3
            send_every: 3
      on_value:
        then:
          - lvgl.label.update:
              id: label_temp_outside
              text: !lambda 'char buf[8]; sprintf(buf, "%.0f C", x); return std::string(buf);'
    temperature_exhaust:
      name: ${name_temp_exhaust}
      id: sensor_temp_exhaust
      filters:
        - exponential_moving_average:
            alpha: 0.3
            send_every: 3
      on_value:
        then:
          - lvgl.label.update:
              id: label_temp_exhaust
              text: !lambda 'char buf[8]; sprintf(buf, "%.0f C", x); return std::string(buf);'
    temperature_extract:
      name: ${name_temp_extract}
      id: sensor_temp_extract
      filters:
        - exponential_moving_average:
            alpha: 0.3
            send_every: 3
      on_value:
        then:
          - lvgl.label.update:
              id: label_temp_inside
              text: !lambda 'char buf[8]; sprintf(buf, "%.0f C", x); return std::string(buf);'
    temperature_supply:
      name: ${name_temp_supply}
      id: sensor_temp_supply
      filters:
        - exponential_moving_average:
            alpha: 0.3
            send_every: 3
      on_value:
        then:
          - lvgl.label.update:
              id: label_temp_incoming
              text: !lambda 'char buf[8]; sprintf(buf, "%.0f C", x); return std::string(buf);'
    humidity_sensor1:
      name: ${name_humidity1}
      id: sensor_humidity1
      filters:
        - exponential_moving_average:
            alpha: 0.3
            send_every: 3
      on_value:
        then:
          - lvgl.label.update:
              id: label_humidity_bathroom
              text: !lambda 'char buf[8]; sprintf(buf, "%.0f %%", x); return std::string(buf);'
    humidity_sensor2:
      name: ${name_humidity2}
      id: sensor_humidity2
      filters:
        - exponential_moving_average:
            alpha: 0.3
            send_every: 3
      on_value:
        then:
          - lvgl.label.update:
              id: label_humidity_kitchen
              text: !lambda 'char buf[8]; sprintf(buf, "%.0f %%", x); return std::string(buf);'
    co2_concentration:
      name: ${name_co2}
      id: sensor_co2
    boost_remaining:
      name: ${name_boost_remaining}
      id: sensor_boost_remaining
    fault_code:
      name: ${name_fault_code}
      id: sensor_fault_code
    service_months_remaining:
      name: ${name_service_months}
      id: sensor_service_months
    bypass_open:
      name: ${name_bypass_num}
      id: sensor_bypass_open
    fault_indicator:
      name: ${name_health}
      id: sensor_health
    boost_state:
      name: ${name_boost_state_num}
      id: sensor_boost_state

text_sensor:
  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0
    fault_description:
      name: ${name_fault_desc}
      id: ts_fault_desc
    boost_active:
      name: ${name_boost_active}
      id: ts_boost_active
    bypass_state:
      name: ${name_bypass_state}
      id: ts_bypass_state

binary_sensor:
  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0
    preheating_active:
      name: ${name_preheating}
      id: bs_preheating
      on_state:
        then:
          - lvgl.label.update:
              id: label_heat
              text_opa: !lambda "return x ? 100 : 30;"
    freeze_alarm:
      name: ${name_freeze_alarm}
      id: bs_freeze_alarm
    co2_alarm:
      name: ${name_co2_alarm}
      id: bs_co2_alarm
    filter_maintenance:
      name: ${name_filter_maint}
      id: bs_filter_maint
      on_state:
        then:
          - lvgl.label.update:
              id: label_maintenance
              text_opa: !lambda "return x ? 100 : 30;"
    heating_indicator:
      name: ${name_heating}
      id: bs_heating
    supply_fan_running:
      name: ${name_supply_fan}
      id: bs_supply_fan
    exhaust_fan_running:
      name: ${name_exhaust_fan}
      id: bs_exhaust_fan
    external_contact:
      name: ${name_ext_contact}
      id: bs_ext_contact
    fault_relay:
      name: ${name_fault_relay}
      id: bs_fault_relay

switch:
  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0
    summer_mode:
      name: ${name_summer}
      id: sw_summer
      on_turn_on:
        then:
          - lvgl.label.update:
              id: label_bypass
              text_opa: 100%
      on_turn_off:
        then:
          - lvgl.label.update:
              id: label_bypass
              text_opa: 30%
    co2_regulation:
      name: ${name_co2_reg}
      id: sw_co2_reg
    humidity_regulation:
      name: ${name_hum_reg}
      id: sw_hum_reg
  - platform: lvgl
    widget: sw_lvgl_summer
    id: sw_lvgl_summer_entity
    internal: true
    on_turn_on:
      then:
        - switch.turn_on: sw_summer
    on_turn_off:
      then:
        - switch.turn_off: sw_summer

number:
  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0
    basic_fan_speed:
      name: ${name_basic_speed}
      id: num_basic_speed
    max_fan_speed:
      name: ${name_max_speed}
      id: num_max_speed
    bypass_temp:
      name: ${name_bypass_temp}
      id: num_bypass_temp
    preheating_temp:
      name: ${name_preheat_temp}
      id: num_preheat_temp
    frost_alarm_temp:
      name: ${name_frost_temp}
      id: num_frost_temp
    frost_hysteresis:
      name: ${name_frost_hyst}
      id: num_frost_hyst
    co2_setpoint:
      name: ${name_co2_set}
      id: num_co2_set
    humidity_setpoint:
      name: ${name_hum_set}
      id: num_hum_set
    regulation_interval:
      name: ${name_reg_interval}
      id: num_reg_interval
    supply_fan_percent:
      name: ${name_supply_pct}
      id: num_supply_pct
    exhaust_fan_percent:
      name: ${name_exhaust_pct}
      id: num_exhaust_pct
    service_interval:
      name: ${name_svc_interval}
      id: num_svc_interval

select:
  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0
    boost_fireplace_mode:
      name: ${name_boost_mode}
      id: sel_boost_mode
    humidity_auto_search:
      name: ${name_hum_auto}
      id: sel_hum_auto
    max_speed_continuous:
      name: ${name_max_cont}
      id: sel_max_cont

button:
  - platform: helios_kwl
    helios_kwl_id: helios_kwl_0
    boost_airflow:
      name: ${name_btn_air}
      id: btn_boost_air
    boost_fireplace:
      name: ${name_btn_fire}
      id: btn_boost_fire
    stop_boost:
      name: ${name_btn_stop}
      id: btn_stop_boost
    acknowledge_maintenance:
      name: ${name_btn_ack}
      id: btn_ack_maint

output:
  - platform: ledc
    id: backlight_output
    pin: 14
    frequency: 1220Hz
    inverted: false
    min_power: 15%

light:
  - platform: monochromatic
    output: backlight_output
    name: ${name_backlight}
    id: lcd_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 500ms
    gamma_correct: 1.0

spi:
  - id: lcd_spi
    interface: software
    mosi_pin:
      xl9535:
      number: 16
    clk_pin:
      xl9535:
      number: 15

display:
  - platform: mipi_rgb
    model: t-panel-s3

# ── Polices : SANS accents pour LVGL (police Roboto ne les contient pas) ──
font:
  - file: "fonts/RobotoCondensed-Regular.ttf"
    id: ash_icons_24
    size: 24
    bpp: 4
    extras:
      - file: "fonts/materialdesignicons-webfont.ttf"
        glyphs: [
          "\U000F18D7", "\U000F0F45", "\U000F0922", "\U000F058E",
          "\U000F1A45", "\U000F0EBD", "\U000F0F8B", "\U000F0210",
          "\U000F006A", "\U000F0815", "\U000F0798", "\U000F092E",
          "\U000F012C", "\U000F1629", "\U000F0717",
          "\U000F0141", "\U000F0142",
          "\U000F04DB",
          ]

  - file: "fonts/RobotoCondensed-Regular.ttf"
    id: roboto_font_20
    size: 20
    bpp: 4

  - file: "fonts/RobotoCondensed-Regular.ttf"
    id: roboto_font_24
    size: 24
    bpp: 4

  - file: "fonts/RobotoCondensed-Regular.ttf"
    id: roboto_font_84
    size: 84
    bpp: 4

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    on_time:
      - seconds: 0
        minutes: /1
        then:
          - lvgl.label.update:
              id: label_date_time
              text: !lambda |-
                const char* days[] = {"Dim","Lun","Mar","Mer","Jeu","Ven","Sam"};
                auto now = id(sntp_time).now();
                char buffer[32];
                sprintf(buffer, "%s %02d/%02d/%04d %02d:%02d",
                        days[now.day_of_week - 1],
                        now.day_of_month, now.month, now.year,
                        now.hour, now.minute);
                return std::string(buffer);

# ═══════════════════════════════════════════════════════════════
# LVGL — P5: pas d'accents dans les labels LVGL
#         P6: layout corrige sans superposition
# ═══════════════════════════════════════════════════════════════

lvgl:
  style_definitions:
    - id: obj_styles
      bg_opa: TRANSP
      border_opa: TRANSP

  touchscreens:
    - touchscreen_id: my_touchscreen

  pages:

    - id: main_page
      bg_color: 0x000000
      on_load:
        then:
          - lambda: id(arc_updating) = true;
          - lvgl.arc.update:
              id: fan_speed_arc
              value: !lambda "return (int)id(helios_kwl_fan).speed;"
          - lvgl.label.update:
              id: label_fan_speed
              text: !lambda 'char buf[4]; sprintf(buf, "%d", (int)id(helios_kwl_fan).speed); return std::string(buf);'
          - lambda: id(arc_updating) = false;

      widgets:
        - label:
            id: label_date_time
            pad_top: 15px
            pad_left: 20px
            text: "--"
            text_color: 0xFFFFFF
            text_font: roboto_font_20

        - obj:
            align: TOP_RIGHT
            width: 200
            height: 60
            styles: obj_styles
            layout:
              pad_column: 0
              type: GRID
              grid_rows: [FR(1)]
              grid_columns: [FR(20), FR(20), FR(20), FR(20), FR(20)]
            widgets:
              - label:
                  id: label_bypass
                  text: "\U000F0F8B"
                  text_opa: 30%
                  text_font: ash_icons_24
                  text_color: 0xFFFFFF
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
              - label:
                  id: label_heat
                  text: "\U000F1A45"
                  text_opa: 30%
                  text_font: ash_icons_24
                  text_color: 0xFFFFFF
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
              - label:
                  id: label_maintenance
                  text: "\U000F0EBD"
                  text_opa: 30%
                  text_font: ash_icons_24
                  text_color: 0xFFFFFF
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 2
              - label:
                  id: label_boost_icon
                  text: "\U000F0210"
                  text_opa: 30%
                  text_font: ash_icons_24
                  text_color: 0xFFFFFF
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 3
              - label:
                  id: label_wifi_strength
                  text: "\U000F092E"
                  text_font: ash_icons_24
                  text_color: 0xFFFFFF
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 4

        - arc:
            x: 8
            y: -5
            id: fan_speed_arc
            align: CENTER
            width: 320
            height: 320
            adjustable: true
            value: 0
            arc_color: 0x1a1a1a
            min_value: 0
            max_value: 8
            start_angle: 150
            end_angle: 30
            indicator:
              arc_color: 0xFFFFFF
            knob:
              bg_color: 0xFFFFFF
            on_value:
              then:
                - if:
                    condition:
                      lambda: return !id(arc_updating);
                    then:
                      - lambda: id(arc_updating) = true;
                      - if:
                          condition:
                            lambda: return x == 0;
                          then:
                            - fan.turn_off: helios_kwl_fan
                          else:
                            - fan.turn_on:
                                id: helios_kwl_fan
                                speed: !lambda "return x;"
                      - lvgl.label.update:
                          id: label_fan_speed
                          text: !lambda 'char buf[4]; sprintf(buf, "%d", (int)x); return std::string(buf);'
                      - lambda: id(arc_updating) = false;

        - label:
            id: label_fan_speed
            text: "0"
            align: CENTER
            text_font: roboto_font_84
            text_color: 0xFFFFFF
            on_click:
              then:
                - lambda: id(arc_updating) = true;
                - if:
                    condition:
                      lambda: return id(helios_kwl_fan).state;
                    then:
                      - fan.turn_off: helios_kwl_fan
                      - lvgl.arc.update:
                          id: fan_speed_arc
                          value: 0
                      - lvgl.label.update:
                          id: label_fan_speed
                          text: "0"
                    else:
                      - fan.turn_on: helios_kwl_fan
                      - lvgl.arc.update:
                          id: fan_speed_arc
                          value: !lambda "return (int)id(helios_kwl_fan).speed;"
                      - lvgl.label.update:
                          id: label_fan_speed
                          text: !lambda 'char buf[4]; sprintf(buf, "%d", (int)id(helios_kwl_fan).speed); return std::string(buf);'
                - lambda: id(arc_updating) = false;

        - label:
            text: "\U000F0210"
            align: CENTER
            pad_bottom: 40
            pad_left: 60
            text_font: ash_icons_24
            text_color: 0xFFFFFF

        # P5 FIX: pas d'accents — "Interieur", "Exterieur", "Rejete"
        - obj:
            align: BOTTOM_MID
            width: 400
            height: 160
            scrollbar_mode: "OFF"
            pad_bottom: 15px
            styles: obj_styles
            layout:
              type: grid
              grid_rows: [fr(1), fr(1), fr(1)]
              grid_columns: [fr(1), fr(1)]
              pad_row: 0px
              pad_column: 20px
            widgets:
              - obj:
                  width: 180
                  height: 50
                  styles: obj_styles
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  scrollbar_mode: "OFF"
                  layout: {pad_column: 0, type: GRID, grid_rows: [FR(1)], grid_columns: [FR(20), FR(60), FR(20)]}
                  widgets:
                    - label: {text: "\U000F0F45", text_font: ash_icons_24, text_color: 0xFFFFFF, grid_cell_row_pos: 0, grid_cell_column_pos: 0}
                    - label: {text: "Interieur", text_font: roboto_font_20, text_color: 0xFFFFFF, grid_cell_row_pos: 0, grid_cell_column_pos: 1}
                    - label: {id: label_temp_inside, text: "--C", text_font: roboto_font_20, text_color: 0xFFFFFF, grid_cell_row_pos: 0, grid_cell_column_pos: 2}
              - obj:
                  width: 180
                  height: 50
                  styles: obj_styles
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
                  scrollbar_mode: "OFF"
                  layout: {pad_column: 0, type: GRID, grid_rows: [FR(1)], grid_columns: [FR(20), FR(60), FR(20)]}
                  widgets:
